<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stable TV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<style>
body { margin:0; background:#000; color:#fff; font-family:Arial; }
#wrap { display:flex; height:100vh; }

#list {
  width:280px;
  background:#111;
  overflow:auto;
}

.item {
  padding:12px;
  border-bottom:1px solid #222;
  cursor:pointer;
}
.item:hover { background:#222; }
.item.active { background:#007AFF; }

#player {
  flex:1;
  position:relative;
  background:#000;
}

video, iframe {
  width:100%;
  height:100%;
}

#msg {
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#666;
}
</style>
</head>

<body>

<div id="wrap">
  <div id="list"></div>

  <div id="player">
    <div id="msg">Kanal seç</div>
    <video id="v" controls style="display:none;"></video>
    <div id="yt"></div>
  </div>
</div>

<script>
let data = [];
let current = -1;
let hls = null;
let yt = null;

/* 🔥 GARANTİ VERİ (boş kalmayı engeller) */
const fallback = [
  { name:"MP4 Test", url:"https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/720.mp4" },
  { name:"HLS Test", url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
  { name:"YouTube Test", url:"https://www.youtube.com/watch?v=dQw4w9WgXcQ" }
];

async function load() {
  try {
    const r = await fetch("channels.json");
    const j = await r.json();
    data = (j.channels && j.channels.length) ? j.channels : fallback;
  } catch {
    data = fallback;
  }
  draw();
}

function draw() {
  const box = document.getElementById("list");
  box.innerHTML = "";

  data.forEach((c,i)=>{
    const d = document.createElement("div");
    d.className="item";
    d.textContent = c.name;
    d.onclick = ()=>play(i);
    box.appendChild(d);
  });
}

function play(i){
  current = i;

  document.querySelectorAll(".item").forEach((e,idx)=>{
    e.classList.toggle("active", idx===i);
  });

  stop();

  const c = data[i];
  if(!c) return;

  document.getElementById("msg").style.display="none";

  const video = document.getElementById("v");
  const ytBox = document.getElementById("yt");

  ytBox.innerHTML="";
  ytBox.style.display="none";
  video.style.display="none";

  const url = c.url;

  /* 🔵 YOUTUBE */
  if(url.includes("youtube.com") || url.includes("youtu.be")){
    ytBox.style.display="block";

    let id = url.split("v=")[1] || url.split("/").pop();

    yt = new YT.Player("yt", {
      videoId: id,
      playerVars: { autoplay:1, controls:1 }
    });

    return;
  }

  video.style.display="block";

  /* 🟢 HLS */
  if(url.includes(".m3u8")){
    if(Hls.isSupported()){
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=>video.play());
    } else {
      video.src = url;
      video.play();
    }
    return;
  }

  /* 🔴 MP4 */
  video.src = url;
  video.play();
}

function stop(){
  const v = document.getElementById("v");

  if(hls){ hls.destroy(); hls=null; }
  v.pause();
  v.src="";

  if(yt){ yt.destroy(); yt=null; }
}

load();
</script>

</body>
</html>
