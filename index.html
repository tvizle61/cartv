<!DOCTYPE html>
<html lang="tr">
<head>
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Car Play Video Pro TV</title>
  <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/hls.js@latest)"></script>
  <script src="[youtube.com](https://www.youtube.com/iframe_api)"></script>
  <style>
    /* --- INTERNET YOK EKRANI STİLİ --- */
    #offline-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.92); z-index: 10001;
      display: none; flex-direction: column; justify-content: center; align-items: center;
      color: var(--text-primary); text-align: center; backdrop-filter: blur(15px);
      transition: opacity 0.3s;
    }
    #offline-overlay h2 { font-size: 2.5em; margin: 20px 0 10px 0; color: var(--accent-color); font-weight: 900; letter-spacing: 1px; }
    #offline-overlay p { font-size: 1.1em; color: var(--text-secondary); margin-bottom: 30px; max-width: 80%; }
    #offline-retry-btn {
      padding: 15px 40px; font-size: 1.1em; font-weight: bold;
      background: var(--accent-color); color: #000; border: none; border-radius: 50px;
      cursor: pointer; transition: all 0.3s; box-shadow: 0 0 20px rgba(0,0,0,0.5);
      text-transform: uppercase; letter-spacing: 1px;
    }
    #offline-retry-btn:hover { transform: scale(1.1); box-shadow: 0 0 40px var(--accent-color); color: #fff; }
    .offline-icon { font-size: 80px; animation: pulse-offline 3s infinite ease-in-out; filter: drop-shadow(0 0 20px var(--accent-color)); }
    @keyframes pulse-offline { 0% { opacity: 0.6; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.6; transform: scale(0.9); } }

    :root {
      --player-height: 65px;
      --category-bar-height: 50px;
      --video-controls-height: 70px;
    }

    /* --- TEMALAR (kısaltılmış) --- */
    [data-theme='default'] { --bg-primary: #000000; --bg-secondary: #141414; --bg-tertiary: #1f1f1f; --bg-hover: #333333; --border-color: #333; --accent-color: #007AFF; --accent-color-darker: #0056b3; --text-primary: #ffffff; --text-secondary: #a1a1a1; }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg-primary); color: var(--text-primary); font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100%; padding-bottom: calc(var(--player-height) + var(--category-bar-height)); }
    #main { display: flex; flex: 1; overflow: hidden; }

    #channels { flex: 0 0 300px; background: var(--bg-secondary); overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 8px; }
    .channel { display: flex; align-items: center; padding: 12px 15px; gap: 15px; background: var(--bg-tertiary); border-radius: 8px; border-left: 5px solid transparent; cursor: pointer; transition: 0.2s; }
    .channel.active { border-left-color: var(--accent-color); background: var(--bg-hover); }
    .channel.playing-active { background: var(--accent-color-darker); }

    #previewArea { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); position: relative; }
    #videoContainer { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #previewVideo, #youtubePlayer { width: 100%; height: 100%; object-fit: contain; }
    #youtubePlayer { display: none; }
    #previewPlaceholder {
      position: absolute; width: 100%; height: 100%; top: 0; left: 0; display: flex; justify-content: center; align-items: center;
      flex-direction: column; color: var(--text-secondary);
    }

    #videoControlsBar {
      height: var(--video-controls-height);
      background: var(--bg-secondary);
      display: flex; align-items: center; justify-content: center; gap: 30px;
    }
    .player-nav-btn { padding: 12px 30px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-tertiary); color: var(--text-primary); cursor: pointer; }

    #fullscreenBtn { background: linear-gradient(135deg, var(--accent-color), var(--accent-color-darker)); color: #fff; }

    #groups { position: fixed; bottom: var(--player-height); left: 0; width: 100%; height: var(--category-bar-height); background: var(--bg-secondary); display: flex; overflow-x: auto; }
    .group { padding: 0 25px; line-height: var(--category-bar-height); cursor: pointer; }
    .group.active { background: var(--accent-color); color: #fff; }

    #playerContainer { position: fixed; bottom: 0; left: 0; width: 100%; height: var(--player-height); background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; color: #fff; }
  </style>
</head>
<body data-theme="default">
  <div id="app">
    <div id="main">
      <div id="channels"></div>
      <div id="previewArea">
        <div id="videoContainer">
          <div id="previewPlaceholder">
            <h1>📺 Car Play Video Pro TV 📺</h1>
            <h2>H O Ş G E L D İ N İ Z 📞</h2>
            <p>✔️Lütfen bir kategori seçip kanala tıklayınız.✔️</p>
          </div>
          <video id="previewVideo" autoplay playsinline style="display:none;"></video>
          <div id="youtubePlayer"></div>
        </div>

        <div id="videoControlsBar">
          <button class="player-nav-btn" onclick="changeChannel(-1)">⏮ Geri</button>
          <button class="player-nav-btn" id="fullscreenBtn" onclick="toggleFullscreen()">⛶ Tam Ekran</button>
          <button class="player-nav-btn" onclick="changeChannel(1)">İleri ⏭</button>
        </div>
      </div>
    </div>
  </div>

  <div id="groups"></div>
  <div id="playerContainer"><div class="marquee-text">B Y D --- İSMET</div></div>

  <script>
    const epgUrl = "[raw.githubusercontent.com](https://raw.githubusercontent.com/ghokun/tv/main/bin/guide.xml)";
    const G_UI = {
      groups: document.getElementById("groups"),
      channels: document.getElementById("channels"),
      preview: { placeholder: document.getElementById("previewPlaceholder"), video: document.getElementById("previewVideo"), youtube: document.getElementById("youtubePlayer") }
    };
    let allChannels = [], currentChannelList = [], currentChannelIndex = -1;
    let hls, ytPlayer, isYouTubeApiReady = false, isPlaying = false, currentlyPlayingChannel = null;

    function onYouTubeIframeAPIReady() { isYouTubeApiReady = true; }

    function playYouTubeStream(videoId) {
      if (!isYouTubeApiReady) return;
      const playerOptions = {
        height: '100%', width: '100%', videoId: videoId,
        playerVars: { 'playsinline': 1, 'autoplay': 1, 'controls': 1, 'rel': 0 },
        events: {
          'onReady': (event) => { event.target.playVideo(); isPlaying = true; },
          'onStateChange': (event) => {
            if (event.data === YT.PlayerState.ENDED) {
              // YouTube video bittiğinde bir sonraki kanala geç
              changeChannel(1);
            }
          }
        }
      };
      if (ytPlayer) {
        ytPlayer.destroy();
      }
      ytPlayer = new YT.Player('youtubePlayer', playerOptions);
      document.getElementById('youtubePlayer').style.display = 'block';
    }

    function stopYouTubeStream() {
      if (ytPlayer && typeof ytPlayer.stopVideo === 'function') ytPlayer.stopVideo();
      document.getElementById('youtubePlayer').style.display = 'none';
    }

    function stopStream(videoElement, hlsInstance) {
      videoElement.pause();
      videoElement.removeAttribute("src");
      if (hlsInstance) hlsInstance.destroy();
    }

    function playStream(videoElement, url) {
      stopStream(videoElement, hls);
      if (Hls.isSupported()) { hls = new Hls(); hls.loadSource(url); hls.attachMedia(videoElement); }
      else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) videoElement.src = url;
      videoElement.muted = false;
      videoElement.play();
      return hls;
    }

    function playChannelInPreview(idx) {
      const channel = currentChannelList[idx];
      if (!channel) return;
      currentChannelIndex = idx; currentlyPlayingChannel = channel; isPlaying = true;
      G_UI.preview.placeholder.style.display = 'none';

      if (channel.youtubeId) {
        stopStream(G_UI.preview.video, hls);
        G_UI.preview.video.style.display = 'none';
        playYouTubeStream(channel.youtubeId);
      } else if (channel.url) {
        stopYouTubeStream();
        G_UI.preview.video.style.display = 'block';
        playStream(G_UI.preview.video, channel.url);
      }
    }

    function changeChannel(direction) {
      if (currentChannelList.length === 0) return;
      const newIndex = (currentChannelIndex + direction + currentChannelList.length) % currentChannelList.length;
      const channelElements = G_UI.channels.querySelectorAll('.channel');
      if (channelElements[newIndex]) {
        channelElements[newIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
        channelElements[newIndex].click();
      }
    }

    function toggleFullscreen() {
      let playerElement = currentlyPlayingChannel?.youtubeId ? document.getElementById('youtubePlayer') : G_UI.preview.video;
      if (!playerElement) return;
      if (!document.fullscreenElement) playerElement.requestFullscreen();
      else document.exitFullscreen();
    }

    async function fetchChannels() {
      try {
        const resp = await fetch('channels.json?v=' + new Date().getTime());
        const data = await resp.json();
        allChannels = data.channels || [];
        listGroups();
      } catch (e) {
        console.error('Kanal listesi yüklenemedi', e);
      }
    }

    function listGroups() {
      const groups = [...new Set(allChannels.map(c => c.group))];
      G_UI.groups.innerHTML = "";
      groups.forEach(g => {
        const el = document.createElement('div');
        el.className = 'group'; el.textContent = g;
        el.onclick = () => { document.querySelectorAll('.group').forEach(e => e.classList.remove('active')); el.classList.add('active'); listChannels(g); };
        G_UI.groups.appendChild(el);
      });
      if (G_UI.groups.firstChild) G_UI.groups.firstChild.click();
    }

    function listChannels(group) {
      G_UI.channels.innerHTML = "";
      currentChannelList = allChannels.filter(c => c.group === group);
      currentChannelList.forEach((c, idx) => {
        const el = document.createElement('div');
        el.className = 'channel';
        el.innerHTML = `<img src="${c.logo || ''}" alt="logo" width="40" height="40"><div>${c.name}</div>`;
        el.onclick = () => playChannelInPreview(idx);
        G_UI.channels.appendChild(el);
      });
    }

    window.addEventListener("load", async () => {
      await fetchChannels();
      document.getElementById('previewArea').addEventListener('dblclick', toggleFullscreen);
    });
  </script>

  <div id="offline-overlay">
    <div class="offline-icon">📡</div>
    <h2>BAĞLANTI YOK</h2>
    <p>TV yayınına devam etmek için lütfen internet bağlantınızı kontrol edin.</p>
    <button id="offline-retry-btn" onclick="window.location.reload()">TEKRAR DENE</button>
  </div>
</body>
</html>
