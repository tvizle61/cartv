<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Car Play Video Pro TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<style>
body { margin:0; font-family:Arial; background:#000; color:#fff; overflow:hidden; }
#app { display:flex; height:100vh; }

/* KANAL LİSTESİ */
#channels {
  width:320px;
  background:#111;
  overflow-y:auto;
  padding:10px;
}

.channel {
  padding:10px;
  margin-bottom:8px;
  background:#222;
  cursor:pointer;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
}

.channel:hover { background:#333; }
.channel.active { background:#007AFF; }

/* PLAYER */
#playerArea {
  flex:1;
  display:flex;
  flex-direction:column;
}

#videoContainer {
  flex:1;
  position:relative;
  background:black;
}

video, iframe {
  width:100%;
  height:100%;
}

/* CONTROLS */
#controls {
  height:60px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
}

button {
  padding:10px 20px;
  border:none;
  background:#333;
  color:#fff;
  cursor:pointer;
  border-radius:6px;
}
button:hover { background:#555; }

#placeholder {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:#aaa;
}
</style>
</head>

<body>

<div id="app">

  <!-- KANAL LİSTESİ -->
  <div id="channels"></div>

  <!-- PLAYER -->
  <div id="playerArea">

    <div id="videoContainer">
      <div id="placeholder">
        <h2>Kanal seçiniz</h2>
      </div>

      <video id="video" controls autoplay style="display:none;"></video>
      <div id="youtube"></div>
    </div>

    <div id="controls">
      <button onclick="changeChannel(-1)">⏮ Önceki</button>
      <button onclick="stopVideo()">⏹ Stop</button>
      <button onclick="changeChannel(1)">Sonraki ⏭</button>
    </div>

  </div>
</div>

<script>
let channels = [];
let currentIndex = -1;
let hls;
let ytPlayer;

/* YOUTUBE READY */
function onYouTubeIframeAPIReady() {}

async function loadChannels() {
  try {
    const res = await fetch("channels.json?v=" + Date.now());
    const data = await res.json();
    channels = data.channels || [];
    renderChannels();
  } catch (e) {
    document.getElementById("channels").innerHTML =
      "Kanal listesi yüklenemedi";
  }
}

function renderChannels() {
  const box = document.getElementById("channels");
  box.innerHTML = "";

  channels.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "channel";
    div.innerHTML = `<span>${c.name}</span>`;
    div.onclick = () => playChannel(i);
    box.appendChild(div);
  });
}

function playChannel(i) {
  currentIndex = i;

  document.querySelectorAll(".channel")
    .forEach((el, idx) => {
      el.classList.toggle("active", idx === i);
    });

  const ch = channels[i];
  if (!ch) return;

  stopVideo();

  document.getElementById("placeholder").style.display = "none";

  /* YOUTUBE */
  if (ch.url.includes("youtube.com") || ch.url.includes("youtu.be")) {

    document.getElementById("video").style.display = "none";
    document.getElementById("youtube").style.display = "block";

    let videoId = ch.url.split("v=")[1] || ch.url.split("/").pop();

    ytPlayer = new YT.Player("youtube", {
      videoId: videoId,
      playerVars: {
        autoplay: 1,
        controls: 1
      }
    });

  } 
  /* HLS / STREAM */
  else {
    document.getElementById("youtube").style.display = "none";
    const video = document.getElementById("video");
    video.style.display = "block";

    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(ch.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } 
    else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = ch.url;
      video.play();
    }
  }
}

function stopVideo() {
  const video = document.getElementById("video");

  if (hls) {
    hls.destroy();
    hls = null;
  }

  video.pause();
  video.src = "";

  if (ytPlayer) {
    ytPlayer.destroy();
    ytPlayer = null;
  }

  document.getElementById("youtube").innerHTML = "";
}

function changeChannel(dir) {
  if (channels.length === 0) return;

  let newIndex = currentIndex + dir;
  if (newIndex < 0) newIndex = channels.length - 1;
  if (newIndex >= channels.length) newIndex = 0;

  playChannel(newIndex);
}

loadChannels();
</script>

</body>
</html>
