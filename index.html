<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TV Player Fix</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<style>
body { margin:0; background:#000; color:#fff; font-family:Arial; }
#app { display:flex; height:100vh; }

#channels {
  width:300px;
  background:#111;
  overflow-y:auto;
  padding:10px;
}

.channel {
  padding:10px;
  margin:5px 0;
  background:#222;
  cursor:pointer;
  border-radius:6px;
}
.channel.active { background:#007AFF; }

#player {
  flex:1;
  display:flex;
  flex-direction:column;
}

#videoBox {
  flex:1;
  position:relative;
  background:black;
}

video, iframe {
  width:100%;
  height:100%;
}

#controls {
  height:60px;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
}

button {
  padding:10px 15px;
  background:#333;
  color:#fff;
  border:none;
  border-radius:6px;
}
button:hover { background:#555; }

#msg {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#888;
}
</style>
</head>

<body>

<div id="app">

<div id="channels"></div>

<div id="player">

  <div id="videoBox">
    <div id="msg">Kanal seç</div>
    <video id="video" controls style="display:none;"></video>
    <div id="yt"></div>
  </div>

  <div id="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="stop()">⏹</button>
    <button onclick="next()">⏭</button>
  </div>

</div>

</div>

<script>
let channels = [];
let index = -1;
let hls;
let ytPlayer;

/* --- DEMO FALLBACK (JSON YOKSA BİLE ÇALIŞIR) --- */
const fallback = [
  { name:"Big Buck Bunny (MP4)", url:"https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/720/Big_Buck_Bunny_720_10s_1MB.mp4" },
  { name:"HLS Test", url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
  { name:"YouTube", url:"https://www.youtube.com/watch?v=dQw4w9WgXcQ" }
];

async function load() {
  try {
    const r = await fetch("channels.json");
    const j = await r.json();
    channels = j.channels || fallback;
  } catch {
    channels = fallback;
  }
  render();
}

function render() {
  const box = document.getElementById("channels");
  box.innerHTML = "";

  channels.forEach((c,i)=>{
    const d = document.createElement("div");
    d.className="channel";
    d.innerText = c.name;
    d.onclick = ()=>play(i);
    box.appendChild(d);
  });
}

function play(i){
  index=i;

  document.querySelectorAll(".channel").forEach((el,idx)=>{
    el.classList.toggle("active", idx===i);
  });

  stop();

  const c = channels[i];
  if(!c) return;

  document.getElementById("msg").style.display="none";

  const video = document.getElementById("video");
  const yt = document.getElementById("yt");

  yt.innerHTML="";
  video.style.display="none";

  /* YOUTUBE */
  if(c.url.includes("youtube.com") || c.url.includes("youtu.be")){
    yt.style.display="block";

    let id = c.url.split("v=")[1] || c.url.split("/").pop();

    ytPlayer = new YT.Player("yt",{
      videoId:id,
      playerVars:{autoplay:1,controls:1}
    });
    return;
  }

  yt.style.display="none";
  video.style.display="block";

  /* HLS */
  if(c.url.includes(".m3u8")){
    if(Hls.isSupported()){
      hls = new Hls();
      hls.loadSource(c.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=>video.play());
    } else {
      video.src=c.url;
      video.play();
    }
  } else {
    /* MP4 */
    video.src=c.url;
    video.play();
  }
}

function stop(){
  const video=document.getElementById("video");

  if(hls){hls.destroy();hls=null;}
  video.pause();
  video.src="";

  if(ytPlayer){ytPlayer.destroy();ytPlayer=null;}
}

function next(){
  if(index<channels.length-1) play(index+1);
  else play(0);
}

function prev(){
  if(index>0) play(index-1);
  else play(channels.length-1);
}

load();
</script>

</body>
</html>
